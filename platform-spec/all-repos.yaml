# Zorbit Repository Manifest
# ---------------------------------------------------------------------------
# Authoritative list of every Zorbit module. Consumed by:
#   - zorbit-cli/scripts/bootstrap-env.sh   (compose + nginx generation)
#   - zorbit-cli/scripts/promote-env.sh     (tier progression)
#
# Owner feedback 2026-04-23 (flaw 1): installer MUST NOT git-clone + build.
# Instead, every runtime repo declares an `image:` pointing at a pre-built
# container image in the registry. The bootstrap pulls that image and
# launches it. For air-gapped installs, a tarball bundle supplies the same
# images via `docker load`.
#
# `image:` default pattern: `ghcr.io/souravsachin/<slug>:<tag>`.
# `<slug>` = repo name (e.g. `zorbit-identity`).
# `<tag>`  = release version (resolved at install time via env var
# `ZORBIT_IMAGE_TAG`, default `latest`).
# ---------------------------------------------------------------------------

schema_version: "1.1"
updated: "2026-04-23"
default_remote: "https://github.com/souravsachin"
default_registry: "ghcr.io/souravsachin"
default_image_tag: "latest"

# Types:
#   core        - governance repo, no runtime
#   service     - runtime NestJS service (has port)
#   sdk         - library published to npm/pypi, no port
#   frontend    - Vite/React or Next.js build artifact
#   cli         - CLI tool, no port
#   app         - business module (ZMB)
#   portal      - customer/prospect portal (frontend)
#
# `image:` presence rule:
#   - type=service|frontend|app|portal -> image REQUIRED
#   - type=core|sdk|cli                -> no image (no runtime)

repos:
  # ------------------------------------------------------------------
  # Governance + tooling
  # ------------------------------------------------------------------
  - name: zorbit-core
    type: core
    port: null
    required: true
    build: none
  - name: zorbit-cli
