# ---------------------------------------------------------------------------
# Zorbit Bundle Map
# ---------------------------------------------------------------------------
# Authoritative mapping from each Zorbit repo to one of 5 deployment bundles.
# Consumed by:
#   - zorbit-cli/scripts/package-bundle.sh     (builds <env>-<bundle>.tar.gz)
#   - zorbit-cli/scripts/templates/compose/*   (generates docker-compose.yml)
#   - zorbit-cli/scripts/gates-harness.sh      (derives EXPECTED_CONTAINERS)
#
# Owner feedback 2026-04-23:
#   - Five bundles: core, pfs, apps, ai, web.
#   - Each bundle runs in ONE physical container under PM2 (except web = nginx).
#   - Ports are PRE-ASSIGNED here, not discovered at runtime.
#   - Container names: {env_prefix}-{bundle}
#       env_prefix in {ze, zq, zd, zu, zp}  (see CONTAINER-NAMING.md)
#     Example: ze-core, zu-pfs, zp-apps
#
# Port ranges (per owner directive, stable within bundle):
#   core: 3000-3099   (100 slots)
#   pfs:  3100-3199   (100 slots)
#   apps: 3200-3599   (400 slots)
#   ai:   3600-3799   (200 slots)
#   web:  3000/80/443 (served by nginx-alpine — no PM2)
#
# Naming rules (STRICT):
#   - Underscores preserved inside module name. Never hyphenate the module
#     portion. `zorbit-app-hi_claim_payment_recon`, NOT `...hi-claim-...`.
#   - `moduleSlug` = repo name with leading `zorbit-` stripped (keep the
#     type prefix). Example: `pfs-rules_engine`, `app-pcg4`, `cor-identity`.
#
# ---------------------------------------------------------------------------

schema_version: "1.0"
updated: "2026-04-23"

# Env prefix substitution hint used when rendering compose/nginx:
#   container_name: "{env_prefix}-{bundle}"  →  "ze-core", "zu-pfs", etc.
env_prefix_substitution: "{env_prefix}-{bundle}"

# Shared infra (per CONTAINER-NAMING.md — zs- prefix across all non-prod).
# NOT part of any bundle; declared here for gates-harness visibility.
shared:
  - name: zs-pg
    image: postgres:16-alpine
    host_port: 5432
  - name: zs-mongo
    image: mongo:7
    host_port: 27017
  - name: zs-kafka
    image: bitnami/kafka:3.7
    host_port: 9092
  - name: zs-redis
    image: redis:7-alpine
    host_port: 6379
  - name: zs-nginx
    image: nginx:1.27-alpine
    host_port: 443
  - name: zs-zeebe
    image: camunda/zeebe:8.5
    host_port: 26500

# ---------------------------------------------------------------------------
# BUNDLE: core  (ports 3000-3099)
# Core platform services — identity / authz / nav / event_bus / pii / audit
# plus the cor-* governance services.
# ---------------------------------------------------------------------------
bundles:
  core:
    port_range: [3000, 3099]
    runtime: pm2
    base_image: zorbit-pm2-base:1.0
    services:
      # Alphabetical order within bundle — ports assigned stably.
      - repo: zorbit-audit
        port: 3006
        slug: audit
      - repo: zorbit-authorization
        port: 3002
        slug: authorization
      - repo: zorbit-cor-deployment_registry
        port: 3021
        slug: cor-deployment_registry
      - repo: zorbit-cor-module_registry
        port: 3020
        slug: cor-module_registry
      - repo: zorbit-cor-observability
        port: 3022
        slug: cor-observability
      - repo: zorbit-cor-secrets_vault
        port: 3023
        slug: cor-secrets_vault
      - repo: zorbit-event_bus
        port: 3004
        slug: event_bus
      - repo: zorbit-identity
        port: 3001
        slug: identity
      - repo: zorbit-navigation
